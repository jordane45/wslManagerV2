name: wsl_manager
description: "Application Windows 11 portable pour gérer visuellement les instances WSL."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Système & processus
  process_run: ^0.14.2
  win32: ^5.5.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # UI / Fenêtre
  window_manager: ^0.3.9
  flutter_acrylic: ^1.1.1
  system_tray: ^2.0.3

  # State management & routing
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0

  # Réseau
  http: ^1.2.1
  dio: ^5.4.3

  # Fichiers & formats
  file_picker: ^8.1.2
  archive: ^3.6.1
  shared_preferences: ^2.2.3

  # UI utilitaires
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.0
  timeago: ^3.6.1
  url_launcher: ^6.3.0

  # UUID
  uuid: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 256

flutter:
  uses-material-design: true

  assets:
    - assets/data/official_distros.json
    - assets/icons/app_icon.ico
    - assets/icons/distros/
